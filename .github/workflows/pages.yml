name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          cat > docs/releases.md << 'EOF'
          ---
          layout: default
          title: Release Notes
          ---
          EOF
          echo "" >> docs/releases.md
          echo "# Release Notes" >> docs/releases.md
          echo "" >> docs/releases.md
          echo "Auto-generated from git history on every push to \`master\`." >> docs/releases.md
          echo "" >> docs/releases.md
          git log --pretty=format:"<div class=\"release-entry\"><span class=\"release-hash\">%h</span> &nbsp;<strong>%s</strong><br><small>%ad &nbsp;&middot;&nbsp; %an</small></div>" \
            --date=format:"%d %b %Y" >> docs/releases.md

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Jekyll
        run: bundle install
        working-directory: docs

      - name: Build Jekyll
        run: bundle exec jekyll build --destination ../_site
        working-directory: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
